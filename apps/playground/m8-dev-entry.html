<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendered Motion public element playground</title>
    <style>
      body{font:14px system-ui;margin:2rem;background:#101218;color:#f5f7ff}
      button,select{font:inherit;margin:.25rem}.stage{display:grid;grid-template-columns:auto 1fr;gap:2rem}
      rendered-motion{width:180px;aspect-ratio:5/3;border:1px solid #38405c}
      pre{white-space:pre-wrap;max-height:60vh;overflow:auto;background:#181c28;padding:1rem}
      .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)}
    </style>
  </head>
  <body>
    <h1>Rendered Motion public element playground</h1>
    <div id="app"></div>
    <script type="module" src="/src/m8-dev-client.ts"></script>
  </body>
</html>
