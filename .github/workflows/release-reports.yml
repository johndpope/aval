name: release-reports

on:
  workflow_dispatch:
    inputs:
      commit: { description: Candidate commit contained in the protected default branch, required: true, type: string }
      candidate-run-id: { description: Exact release-candidate workflow run ID, required: true, type: string }
      candidate-artifact: { description: Exact candidate artifact name, required: true, type: string }
      candidate-manifest-sha256: { description: Reviewed candidate manifest SHA-256, required: true, type: string }
      raw-report-run-id: { description: Exact operator evidence workflow run ID, required: true, type: string }
      raw-report-artifact: { description: Exact raw named-profile report artifact, required: true, type: string }
      raw-report-workflow: { description: Exact in-repository workflow path that uploaded raw evidence, required: true, type: string }

concurrency:
  group: release-reports-1.0.0
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  assemble:
    environment: release-reports
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      actions: read
    env:
      INPUT_COMMIT: ${{ inputs.commit }}
      INPUT_CANDIDATE_RUN_ID: ${{ inputs.candidate-run-id }}
      INPUT_CANDIDATE_ARTIFACT: ${{ inputs.candidate-artifact }}
      INPUT_CANDIDATE_DIGEST: ${{ inputs.candidate-manifest-sha256 }}
      INPUT_RAW_REPORT_RUN_ID: ${{ inputs.raw-report-run-id }}
      INPUT_RAW_REPORT_ARTIFACT: ${{ inputs.raw-report-artifact }}
      INPUT_RAW_REPORT_WORKFLOW: ${{ inputs.raw-report-workflow }}
      GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: 22.12.0, cache: npm }
      - run: node scripts/release/validate-workflow-inputs.mjs authorize
      - run: node scripts/release/checkout-authorized-commit.mjs
      - run: node scripts/release/validate-workflow-inputs.mjs reports
      - run: npm ci --ignore-scripts
      - run: node node_modules/typescript/bin/tsc -p packages/certification/tsconfig.json
      - name: Bind both source runs to their exact workflows and commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/release/verify-workflow-run.mjs \
            --run-id "$INPUT_CANDIDATE_RUN_ID" \
            --expected-workflow .github/workflows/release-candidate.yml \
            --expected-commit "$INPUT_COMMIT"
          node scripts/release/verify-workflow-run.mjs \
            --run-id "$INPUT_RAW_REPORT_RUN_ID" \
            --expected-workflow "$INPUT_RAW_REPORT_WORKFLOW" \
            --expected-commit "$INPUT_COMMIT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.candidate-artifact }}
          path: incoming/candidate
          run-id: ${{ inputs.candidate-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.raw-report-artifact }}
          path: incoming/reports
          run-id: ${{ inputs.raw-report-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify the exact candidate before accepting operator evidence
        run: |
          node scripts/release/verify-manifest.mjs \
            --candidate incoming/candidate/candidate-manifest.json \
            --expected-candidate-digest "$INPUT_CANDIDATE_DIGEST" \
            --verify-environment true
      - name: Assemble and reconstruct the closed named-profile report set
        run: |
          node scripts/certification/render-report-index.mjs \
            --reports incoming/reports \
            --candidate incoming/candidate/candidate-manifest.json \
            --path-root incoming/reports \
            --output-json incoming/reports/index.json \
            --output-markdown incoming/reports/index.md
          node scripts/certification/validate-report-index.mjs \
            --index incoming/reports/index.json \
            --candidate incoming/candidate/candidate-manifest.json \
            --path-root incoming/reports \
            --expected-candidate-digest "$INPUT_CANDIDATE_DIGEST" \
            --require-passed true \
            --require-closed-root true
      - id: report_index
        run: node scripts/release/export-file-digest.mjs --path incoming/reports/index.json --key digest
      - if: always()
        env: { WORKFLOW_JOB_STATUS: "${{ job.status }}" }
        run: node scripts/release/write-workflow-result.mjs --output workflow-results/reports.json --job assemble
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rendered-motion-1.0.0-reports-${{ inputs.commit }}
          path: incoming/reports
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 90
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: rendered-motion-1.0.0-reports-result-${{ github.run_id }}
          path: workflow-results/reports.json
          if-no-files-found: warn
          include-hidden-files: false
          retention-days: 90
